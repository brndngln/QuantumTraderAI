[app]
name = "quantum-trader"
region = "us-east-1"

[app.environment]
REDIS_URL = "@redis_url"
DATABASE_URL = "@database_url"
API_KEY = "@api_key"
SECRET_KEY = "@secret_key"
ENVIRONMENT = "production"
DEBUG = "false"

[app.build]
command = "python -m pip install --upgrade pip && pip install -r requirements.txt"

[app.deploy]
branch = "main"

[app.services]
web = { 
  ports = [8000], 
  memory = "1GB", 
  cpu = "2",
  command = "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
}
redis = { 
  ports = [6379], 
  memory = "512MB", 
  cpu = "1",
  command = "redis-server --requirepass $REDIS_PASSWORD"
}
frontend = { 
  ports = [3000], 
  memory = "512MB", 
  cpu = "1",
  command = "npm start"
}
worker = { 
  memory = "512MB", 
  cpu = "1",
  command = "celery -A backend.worker worker --loglevel=info"
}

[app.variables]
REDIS_PASSWORD = "your_secure_redis_password"
CELERY_BROKER_URL = "@redis_url"
CELERY_RESULT_BACKEND = "@redis_url"

[app.secrets]
redis_password = "your_secure_redis_password"

[app.database]
name = "quantum_trader_db"
type = "postgresql"
version = "14"

[app.cache]
name = "quantum_trader_cache"
type = "redis"
version = "6"

[app.queues]
name = "quantum_trader_queue"
type = "redis"
version = "6"

[app.logs]
name = "quantum_trader_logs"
retention = "60d"

[app.monitoring]
name = "quantum_trader_monitoring"
provider = "datadog"

[app.security]
name = "quantum_trader_security"
provider = "cloudflare"

[app.scale]
min = 1
max = 5

[app.autoscaling]
metric = "cpu"
threshold = 80

[app.healthcheck]
path = "/health"
interval = "30s"
timeout = "5s"

[app.cors]
allow_origins = ["http://localhost:3000", "https://*.vercel.app"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allow_headers = ["Content-Type", "Authorization", "X-Requested-With"]

[app.feature_flags]
strategy_fusion = true
sector_analysis = true
liquidation_detection = true
market_simulation = true

[app.trading]
max_trade_size = 100000
max_positions = 10
max_leverage = 5

[app.ai]
model_cache_dir = "/tmp/quantum_ai_models"
max_model_memory = 4096

[app.broker]
timeout = 30
retry_delay = 5

[app.strategy]
min_confidence = 0.7
max_risk_per_trade = 0.01

[app.cache_config]
ttl = 3600
prefix = "quantum_trader:"
