# Redis configuration for Quantum Trader

# General
bind 0.0.0.0
protected-mode no
port 6379

# Memory Management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
dbfilename quantum_trader.rdb
save 900 1
save 300 10
save 60 10000

# Security
requirepass your_secure_redis_password

# Performance
tcp-backlog 511
hz 10

# AOF
appendonly yes
appendfilename "quantum_trader.aof"
appendfsync everysec

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000

# Security
requirepass your_secure_redis_password

# Logging
loglevel notice
logfile "redis.log"

# Memory Management
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
