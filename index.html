<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4',
          },
        },
      },
    }
  </script>

  <!-- Font Styling -->
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #000;
      color: white;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="bg-dark-900 min-h-screen flex items-center justify-center p-8">
  <div class="text-center max-w-xl">
    <h1 class="text-4xl font-bold mb-2">QuantumTraderAI</h1>
    <p class="mb-6 text-lg text-gray-300">Autonomous Trading Dashboard</p>
    <button onclick="runStrategies()"
      class="bg-primary hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold transition transform">
      Run Strategies
    </button>
  </div>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch("https://quantumtraderai-production.up.railway.app/run");
        const data = await response.json();
        console.log(data);
        alert(JSON.stringify(data, null, 2));
      } catch (error) {
        console.error("Error calling backend:", error);
        alert("❌ Failed to reach backend. Check console.");
      }
    }
  </script>
</body>
</html>
