<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4',
          },
        },
      },
    };
  </script>

  <!-- Custom Fonts -->
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding-top: 100px;
      margin: 0;
    }

    button {
      padding: 10px 20px;
      background-color: #3b82f6;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #2563eb;
    }
  </style>
</head>

<body>
  <h1 class="text-4xl font-bold mb-4">QuantumTraderAI</h1>
  <p class="text-lg mb-8">Autonomous Trading Dashboard</p>
  <button onclick="runStrategies()">Run Strategies</button>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch("https://quantumtraderai-production.up.railway.app/run");
        const data = await response.json();
        console.log(data);
        alert(JSON.stringify(data, null, 2));
      } catch (error) {
        console.error("Error calling backend:", error);
        alert("❌ Failed to reach backend. Check console.");
      }
    }
  </script>
</body>
</html>
