<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4'
          }
        }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
  </style>
</head>
<body class="bg-dark-900 text-white flex items-center justify-center h-screen">
  <div class="text-center">
    <h1 class="text-4xl font-fracta mb-2">QuantumTraderAI</h1>
    <p class="mb-6">Autonomous Trading Dashboard</p>
    <button onclick="runStrategies()" class="bg-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition">Run Strategies</button>
  </div>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run');
        const data = await response.json();
        console.log('✅ Strategy Response:', data);
      } catch (error) {
        console.error('❌ Fetch failed:', error);
      }
    }
  </script>
</body>
</html>
