<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4',
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            flicker: 'flicker 1.5s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            flicker: {
              '0%, 19%, 21%, 23%, 25%, 54%, 56%, 100%': {
                opacity: 1,
              },
              '20%, 24%, 55%': {
                opacity: 0.4,
              },
            },
          },
        },
      },
    };
  </script>
  <script>
    async function runStrategies() {
      try {
        const response = await fetch("https://quantumtraderai-production.up.railway.app/run");
        const data = await response.json();
        console.log("Trade Strategy Response:", data);
        alert("Strategy executed: " + JSON.stringify(data));
      } catch (error) {
        console.error("Run failed:", error);
        alert("Run failed. See console for details.");
      }
    }
  </script>
</head>
<body class="bg-dark-900 text-white font-fracta flex items-center justify-center min-h-screen">
  <div class="text-center space-y-4">
    <h1 class="text-4xl font-bold">QuantumTraderAI</h1>
    <p class="text-lg text-gray-400">Autonomous Trading Dashboard</p>
    <button
      onclick="runStrategies()"
      class="bg-primary hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300"
    >
      Run Strategies
    </button>
  </div>
</body>
</html>
