<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif']
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#141414',
            },
            primary: '#3b82f6',
            secondary: '#f43f5e'
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            flicker: 'flicker 1.5s infinite'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-8px)' }
            },
            flicker: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.4 }
            }
          }
        }
      }
    }
  </script>

  <!-- Custom Font -->
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
  </style>
</head>

<body class="bg-dark-900 text-white font-fracta p-10 text-center min-h-screen flex flex-col justify-center items-center space-y-8">

  <h1 class="text-5xl font-orbitron font-bold">QuantumTraderAI</h1>
  <p class="text-xl text-gray-400">Autonomous Trading Dashboard</p>

  <button
    id="runBtn"
    class="bg-primary hover:bg-secondary px-8 py-4 rounded-xl text-white font-bold text-lg transition transform hover:scale-105"
  >
    ▶️ Run Strategies
  </button>

  <p class="text-xs text-gray-500 mt-8">Powered by Neural Core</p>

  <!-- Backend Trigger Script -->
  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run-strategies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.json();
        alert("✅ Strategy triggered:\n" + JSON.stringify(result, null, 2));
      } catch (err) {
        alert("❌ Failed to run strategy: " + err.message);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelector("#runBtn").addEventListener("click", runStrategies);
    });
  </script>

</body>
</html>
