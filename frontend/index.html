<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4',
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            flicker: 'flicker 1.5s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            flicker: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.8 },
            },
          },
        }
      }
    };
  </script>
  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run');
        const data = await response.json();
        console.log("✅ AI Strategy Response:", data);
        alert("AI Strategy run successfully. Check console for output.");
      } catch (error) {
        console.error("❌ Error calling backend:", error);
        alert("Failed to call backend. See console for details.");
      }
    }
  </script>
</head>
<body class="bg-dark-900 text-white font-fracta flex items-center justify-center h-screen">
  <div class="text-center">
    <h1 class="text-4xl font-bold mb-2">QuantumTraderAI</h1>
    <p class="text-lg text-gray-400 mb-6">Autonomous Trading Dashboard</p>
    <button onclick="runStrategies()" class="bg-primary hover:bg-blue-600 text-white px-6 py-2 rounded transition duration-200">
      Run Strategies
    </button>
  </div>
</body>
</html>
