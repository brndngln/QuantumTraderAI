<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
    body {
      font-family: 'FractaMinimal', sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      text-align: center;
      padding: 2rem;
    }
    .button {
      background-color: #3b82f6;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <h1 class="text-4xl mb-6 font-bold">QuantumTraderAI</h1>
  <p class="mb-6 text-lg">Your Autonomous Stock Trading Empire</p>

  <button class="button" onclick="runStrategies()">Run Strategies</button>

  <div id="output" class="mt-8 text-left max-w-2xl mx-auto"></div>

  <script>
    async function runStrategies() {
      const outputDiv = document.getElementById("output");
      outputDiv.innerHTML = "<p class='text-yellow-400'>Running strategies...</p>";
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run');
        if (!response.ok) {
          throw new Error(`Server responded with status ${response.status}`);
        }
        const data = await response.json();
        outputDiv.innerHTML = "<pre class='text-green-400'>" + JSON.stringify(data, null, 2) + "</pre>";
      } catch (error) {
        outputDiv.innerHTML = "<p class='text-red-500'>Error: " + error.message + "</p>";
      }
    }
  </script>
</body>
</html>
