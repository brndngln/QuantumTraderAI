<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>

  <!-- Tailwind CDN (for production use PostCSS if needed) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Definitions -->
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
    body {
      font-family: 'FractaMinimal', sans-serif;
    }
  </style>

  <!-- Tailwind Custom Theme -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif']
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a'
            },
            primary: '#3b82f6',
            secondary: '#9333ea'
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            flicker: 'flicker 1.5s infinite'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-dark-900 text-white flex flex-col items-center justify-center min-h-screen px-4">
  <h1 class="text-4xl font-orbitron mb-2">QuantumTraderAI</h1>
  <p class="text-lg mb-6 text-gray-400">Autonomous Trading Dashboard</p>

  <button
    onclick="runStrategies()"
    class="bg-primary hover:bg-secondary px-6 py-3 rounded-lg font-bold transition transform hover:scale-105"
  >
    Run Strategies
  </button>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run', {
          method: 'GET'
        });

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();
        alert("Success:\n" + JSON.stringify(data, null, 2));
      } catch (error) {
        alert("Error:\n" + error.message);
      }
    }
  </script>
</body>
</html>
