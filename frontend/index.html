<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantumTraderAI | Elite Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans text-center py-20">
  <h1 class="text-4xl font-bold mb-4">QuantumTraderAI</h1>
  <p class="mb-8">Autonomous Trading Dashboard</p>
  <button 
    class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded text-white font-semibold transition"
    onclick="runStrategies()"
  >
    Run Strategies
  </button>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run', {
          method: 'GET',
        });
        const data = await response.json();
        alert('Strategy run completed: ' + JSON.stringify(data));
      } catch (error) {
        console.error('Error running strategy:', error);
        alert('Failed to run strategies.');
      }
    }
  </script>
</body>
</html>
