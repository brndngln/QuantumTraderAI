<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen space-y-8">
  <h1 class="text-5xl font-bold">QuantumTraderAI</h1>
  <p class="text-lg opacity-75">Autonomous Trading Dashboard</p>
  <button 
    onclick="runStrategies()" 
    class="bg-blue-600 hover:bg-blue-800 px-6 py-3 rounded-lg text-white font-bold transition"
  >
    Run Strategies
  </button>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run', {
          method: 'GET'
        });
        const data = await response.json();
        console.log('✅ Success:', data);
        alert('Strategies executed successfully!');
      } catch (error) {
        console.error('❌ Error running strategies:', error);
        alert('Failed to run strategies.');
      }
    }
  </script>
</body>
</html>
