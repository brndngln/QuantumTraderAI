<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTraderAI | Elite Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'FractaMinimal';
      src: url('./fonts/FractaMinimal.woff2') format('woff2');
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fracta: ['FractaMinimal', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            azonix: ['Azonix', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0a',
              800: '#1a1a1a',
            },
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b',
            info: '#06b6d4'
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            flicker: 'flicker 1.5s infinite',
          }
        }
      }
    }
  </script>
  <script>
    async function runStrategies() {
      const response = await fetch('https://quantumtraderai-production.up.railway.app/run');
      const data = await response.json();
      console.log(data);
    }
  </script>
</head>
<body class="bg-black text-white font-fracta flex flex-col items-center justify-center min-h-screen">
  <h1 class="text-4xl font-bold mb-4">QuantumTraderAI</h1>
  <p class="text-lg mb-6">Autonomous Trading Dashboard</p>
  <button onclick="runStrategies()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
    Run Strategies
  </button>
</body>
</html>
