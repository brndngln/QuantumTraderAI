<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen">
  <h1 class="text-5xl font-bold mb-4">QuantumTraderAI</h1>
  <p class="text-xl mb-6">Autonomous Trading Dashboard</p>
  <button 
    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded"
    onclick="runStrategies()">
    Run Strategies
  </button>

  <script>
    async function runStrategies() {
      try {
        const res = await fetch("https://quantumtraderai-production.up.railway.app/run");
        const data = await res.json();
        alert("✅ Strategies executed: " + JSON.stringify(data));
      } catch (err) {
        console.error("Failed to fetch:", err);
        alert("❌ Error running strategies");
      }
    }
  </script>
</body>
</html>
