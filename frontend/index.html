<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantumTraderAI | Autonomous Trading Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');

    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0a0a0a;
      color: white;
    }
    .btn {
      background-color: #3b82f6;
      padding: 0.75rem 1.5rem;
      font-weight: bold;
      border-radius: 0.5rem;
      transition: transform 0.2s ease;
    }
    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen px-4">
  <h1 class="text-4xl font-bold mb-2">QuantumTraderAI</h1>
  <p class="text-lg text-gray-400 mb-6">Autonomous Trading Dashboard</p>
  
  <button id="runBtn" class="btn">Run Strategies</button>

  <script>
    async function runStrategies() {
      try {
        const response = await fetch('https://quantumtraderai-production.up.railway.app/run', {
          method: 'GET',
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        
        const result = await response.json();
        alert('Strategies executed:\n' + JSON.stringify(result, null, 2));
      } catch (err) {
        console.error('Strategy Error:', err);
        alert('Failed to run strategies. Check console for details.');
      }
    }

    document.getElementById('runBtn').addEventListener('click', runStrategies);
  </script>
</body>
</html>
