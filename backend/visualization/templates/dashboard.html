<!DOCTYPE html>
<html>
<head>
    <title>Quantum Trader Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .dashboard-card {
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .service-status {
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: inline-block;
            margin-right: 5px;
        }
        .status-green { background-color: #28a745; }
        .status-yellow { background-color: #ffc107; }
        .status-red { background-color: #dc3545; }
        .topology-container {
            min-height: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .traffic-container {
            min-height: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .alert-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 5px;
        }
        .alert-warning { background-color: #ffc107; color: #000; }
        .alert-danger { background-color: #dc3545; color: #fff; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Quantum Trader Dashboard</h1>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-lg-8">
                <div class="topology-container">
                    <h3 class="mb-3">Service Topology</h3>
                    <div id="topology-image" class="text-center">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-4">
                <div class="traffic-container">
                    <h3 class="mb-3">Traffic Patterns</h3>
                    <div id="traffic-image" class="text-center">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <h3>Service Metrics</h3>
                <div id="metrics-container" class="row">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <h3>Alerts</h3>
                <div id="alerts-container" class="row">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script>
        // WebSocket connection
        let ws = new WebSocket('ws://' + window.location.host + '/ws');
        
        // Update UI with new data
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            updateVisualization(data);
        };

        // Update visualization
        function updateVisualization(data) {
            // Update topology image
            if (data.topology && data.topology.image) {
                const topologyImage = document.getElementById('topology-image');
                topologyImage.innerHTML = `<img src="data:image/png;base64,${data.topology.image}" class="img-fluid" alt="Service Topology">`;
            }

            // Update traffic image
            if (data.traffic && data.traffic.image) {
                const trafficImage = document.getElementById('traffic-image');
                trafficImage.innerHTML = `<img src="data:image/png;base64,${data.traffic.image}" class="img-fluid" alt="Traffic Patterns">`;
            }

            // Update metrics
            if (data.metrics) {
                const metricsContainer = document.getElementById('metrics-container');
                metricsContainer.innerHTML = '';
                
                Object.entries(data.metrics).forEach(([service, metrics]) => {
                    const statusClass = getStatusClass(metrics.status);
                    const healthClass = getHealthClass(metrics.health);
                    
                    const metricCard = document.createElement('div');
                    metricCard.className = 'col-12 col-md-6 col-lg-4 metric-card';
                    metricCard.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h4>${service}</h4>
                            <span class="service-status ${statusClass}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Status:</span>
                            <span>${metrics.status}</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Health:</span>
                            <span>${metrics.health}%</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Requests:</span>
                            <span>${metrics.requests}</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Response Time:</span>
                            <span>${metrics.response_time}ms</span>
                        </div>
                    `;
                    metricsContainer.appendChild(metricCard);
                });
            }

            // Update alerts
            if (data.alerts) {
                const alertsContainer = document.getElementById('alerts-container');
                alertsContainer.innerHTML = '';
                
                data.alerts.forEach(alert => {
                    const alertCard = document.createElement('div');
                    alertCard.className = 'col-12 alert-card';
                    const alertClass = alert.type === 'CRITICAL' ? 'alert-danger' : 'alert-warning';
                    alertCard.innerHTML = `
                        <div class="alert ${alertClass} p-3">
                            <span class="alert-badge ${alertClass}">${alert.type}</span>
                            <span>${alert.message}</span>
                        </div>
                    `;
                    alertsContainer.appendChild(alertCard);
                });
            }
        }

        // Helper functions
        function getStatusClass(status) {
            return status === 'healthy' ? 'status-green' :
                   status === 'warning' ? 'status-yellow' :
                   'status-red';
        }

        function getHealthClass(health) {
            return health >= 90 ? 'status-green' :
                   health >= 70 ? 'status-yellow' :
                   'status-red';
        }
    </script>
</body>
</html>
